<!-- sections/partners.html -->
<section id="partners"
  class="w-full flex flex-col items-center justify-center px-6 py-12 md:py-16 bg-secondary space-y-8 md:space-y-10">

  <!-- ── HEADER ── -->
  <div class="flex flex-col space-y-3 items-center text-center">
    <p class="font-text text-xs tracking-[0.25em] uppercase text-accent/50">
      — Trusted By —
    </p>
    <h2 class="font-title text-3xl md:text-4xl text-accent leading-tight" style="letter-spacing: -0.02em;">
      Our Business <em class="text-primary">Partners</em>
    </h2>
    <p class="font-text text-sm md:text-base text-accent/65 max-w-xl mx-auto leading-relaxed">
      Distinguished organizations that have trusted IProcess for their most
      critical business transactions — a reflection of our commitment to
      reliability and mutual success.
    </p>
  </div>

  <!-- ── MARQUEE ── -->
  <!--
    Each .marquee-item is a fixed 240×100px transparent canvas (already normalized).
    The mask fades edges for a seamless infinite feel.
    JS (partners.js) clones items + drives the GSAP horizontalLoop.
  -->
  <div class="mask-fade-horizontal w-3xl overflow-hidden" style="
      mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
      -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
    ">
    <div class="marquee-wrapper flex w-max items-center gap-x-1 md:gap-x-2">

      <div class="marquee-item shrink-0 grayscale hover:grayscale-0 transition-[filter] duration-300 cursor-default">
        <img src="../images/partners/bdo.png" alt="BDO Life logo"
          class="block w-[160px] md:w-[200px] h-[66px] md:h-[84px] object-contain">
      </div>

      <div class="marquee-item shrink-0 grayscale hover:grayscale-0 transition-[filter] duration-300 cursor-default">
        <img src="../images/partners/bpi.png" alt="BPI logo"
          class="block w-[160px] md:w-[200px] h-[66px] md:h-[84px] object-contain">
      </div>

      <div class="marquee-item shrink-0 grayscale hover:grayscale-0 transition-[filter] duration-300 cursor-default">
        <img src="../images/partners/cdo.png" alt="CDO Odyssey Foundation logo"
          class="block w-[160px] md:w-[200px] h-[66px] md:h-[84px] object-contain">
      </div>

      <div class="marquee-item shrink-0 grayscale hover:grayscale-0 transition-[filter] duration-300 cursor-default">
