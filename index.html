<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iProcess PH</title>
  <link rel="stylesheet" href="styles/main.css">

  <link rel="preload" as="image" href="/images/hero-bg.png" fetchpriority="high">
  <link rel="preload" as="image" href="/images/hero-fg.png" fetchpriority="high">
  <link rel="preload" as="image" href="/images/iprocess-logo.png" fetchpriority="high">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato&family=Playfair+Display:ital,wght@1,600&display=swap"
    rel="stylesheet">

  <link rel="shortcut icon" href="images/iprocess-logo.png" type="image/x-icon">
  <script src="https://www.tuqlas.com/chatbot.js" data-key="tq_live_ad029623c6560b83a9e48c04ff3549b322096965"
    data-api="https://www.tuqlas.com" defer></script>
</head>

<body>
  <div id="smooth-wrapper">
    <div id="smooth-content">
      <div id="section-hero"></div>
      <div id="section-partners"></div>
      <div id="section-about"></div>
      <div id="section-choose-us"></div>
      <div id="section-services"></div>
      <div id="section-franchise-merchant"></div>
      <div id="section-footer"></div>
    </div>
  </div>

  <div id="consent-banner" class="fixed bottom-0 left-0 right-0 z-50 px-4 py-4 md:px-8 md:py-5
         bg-white border-t border-black/10 shadow-[0_-4px_24px_rgba(0,0,0,0.08)]
         translate-y-full transition-transform duration-500 ease-out" role="dialog" aria-live="polite"
    aria-label="Data privacy consent">

    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-start sm:items-center gap-4">

      <!-- Shield icon -->
      <div class="w-9 h-9 rounded-xl bg-black/5 border border-black/8 flex items-center justify-center flex-shrink-0">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>

      <!-- Notice text -->
      <p class="font-text text-xs text-black/60 leading-relaxed flex-1">
        <span class="font-semibold text-black">iPROCESS Liaison &amp; Consultancy OPC</span> respects your privacy.
        By continuing to use this website, you agree to the collection and use of your personal data
        in accordance with our
        <a href="/privacy" class="underline text-black/70 hover:text-black transition-colors duration-200">
          Data Privacy Notice
        </a>
        and applicable Philippine data protection laws.
      </p>

      <!-- Actions -->
      <div class="flex items-center gap-3 flex-shrink-0">
        <button id="consent-decline" class="font-text text-xs text-black/45 hover:text-black underline underline-offset-2
               transition-colors duration-200 px-2 py-1">
          Decline
        </button>
        <button id="consent-accept" class="franchise-merchant-bg font-text text-xs font-semibold text-white/85
               px-5 py-2 transition-opacity duration-200 hover:opacity-90">
          I Understand &amp; Accept
        </button>
      </div>

    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
  <script type="module">
    import { initConsentBanner } from '/js/consent-banner.js';
    initConsentBanner();
  </script>
</body>

</html>
